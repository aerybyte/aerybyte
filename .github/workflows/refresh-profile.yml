name: Refresh profile card

"on":
  workflow_dispatch:
  schedule:
    # GitHub schedule execution is UTC and can jitter; use explicit UTC hours
    # that map to Eastern Daylight Time (EDT): 00:00/06:00/12:00/18:00 ET.
    # 04:00/10:00/16:00/22:00 UTC == 00:00/06:00/12:00/18:00 EDT.
    - cron: "0 4,10,16,22 * * *"
  push:
    paths:
      - "profile.template.yml"
      - "requirements.txt"
      - "scripts/build_profile.py"
      - ".github/workflows/refresh-profile.yml"

permissions:
  contents: write

concurrency:
  group: profile-card-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'push' || github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out profile repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install renderer dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Rebuild profile card and ASCII portrait
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional override. Leave unset to use start_date from profile.template.yml.
          PROFILE_START_DATE: ${{ secrets.PROFILE_START_DATE }}
        run: python scripts/build_profile.py --config profile.template.yml

      - name: Commit refreshed assets
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_START_DATE: ${{ secrets.PROFILE_START_DATE }}
        run: |
          branch="${GITHUB_REF_NAME:-main}"

          add_assets() {
            git add \
              README.md \
              assets/avatar.png \
              assets/avatar-ascii.txt \
              assets/github-stats-cache.json \
              assets/profile-terminal-dark.svg \
              assets/profile-terminal-light.svg
          }

          regenerate_from_latest() {
            # Always rebuild from latest remote head to avoid merge/rebase conflicts
            # when generated files changed (for example after profile avatar updates).
            git fetch origin "$branch"
            git reset --hard "origin/$branch"
            python scripts/build_profile.py --config profile.template.yml
            add_assets
          }

          regenerate_from_latest

          if git diff --cached --quiet; then
            echo "Profile assets are already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: refresh profile card"

          # Handle race where another run pushed between commit and push.
          if ! git push origin "HEAD:$branch"; then
            echo "Remote updated during push; regenerating from latest $branch and retrying once."
            regenerate_from_latest

            if git diff --cached --quiet; then
              echo "Latest remote already has current generated assets."
              exit 0
            fi

            git commit -m "chore: refresh profile card"
            git push origin "HEAD:$branch"
          fi
