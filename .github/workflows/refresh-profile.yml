name: Refresh profile card

"on":
  workflow_dispatch:
  schedule:
    # 00:00, 06:00, 12:00, and 18:00 Eastern Time.
    # The IANA timezone keeps the schedule aligned through EST and EDT.
    - cron: "0 */6 * * *"
      timezone: "America/New_York"
  push:
    paths:
      - "profile.template.yml"
      - "requirements.txt"
      - "scripts/build_profile.py"
      - ".github/workflows/refresh-profile.yml"

permissions:
  contents: write

concurrency:
  group: profile-card-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'push' || github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out profile repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install renderer dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Rebuild profile card and ASCII portrait
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          # Optional override. Leave unset to use start_date from profile.template.yml.
          PROFILE_START_DATE: ${{ secrets.PROFILE_START_DATE }}
        run: python scripts/build_profile.py --config profile.template.yml

      - name: Commit refreshed assets
        shell: bash
        run: |
          # Rebase before staging so we work from the latest main tip.
          git pull --rebase origin "${GITHUB_REF_NAME:-main}"

          git add \
            README.md \
            assets/avatar.png \
            assets/avatar-ascii.txt \
            assets/github-stats-cache.json \
            assets/profile-terminal-dark.svg \
            assets/profile-terminal-light.svg

          if git diff --cached --quiet; then
            echo "Profile assets are already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: refresh profile card"

          # Handle race where another run pushed between pull and push.
          if ! git push origin "HEAD:${GITHUB_REF_NAME:-main}"; then
            git pull --rebase origin "${GITHUB_REF_NAME:-main}"
            git push origin "HEAD:${GITHUB_REF_NAME:-main}"
          fi
