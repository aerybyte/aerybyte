# ================================
# PROFILE TEMPLATE (EDIT THIS FILE)
# ================================
# This is the one file most people need to edit.
# The workflow reads this template to build README.md and SVG assets.

profile:
  # Your headline role text
  role: "software engineer · product builder"

  # Optional short line under role (blank hides it)
  tagline: ""

  # Contact metadata shown in [contact]
  discord: "@aeiree"
  email: "erireilly9@gmail.com"

  # Add any extra personal fields you want to appear in [personal].
  # Example: pronouns, location, portfolio, current_focus, etc.
  additional_fields:
    pronouns: "not disclosed"
    portfolio: ""
    current_focus: ""

  # Optional: hide built-in personal fields by label.
  # Example values: role, tagline, human uptime, timezone, pronouns
  disabled_fields: []

  # Optional: add more contact fields under [contact].
  # Example: linkedin, website, x, telegram
  contact_fields:
    linkedin: ""

  # Optional fields that can be shown if toggled below
  show_location: false
  show_website: false

sections:
  # This section powers [top skills] in README
  stack:
    languages: "Python · TypeScript · JavaScript · C# · Java · C · SQL"
    frontend: "React · Next.js · React Native · TypeScript · HTML · CSS · Tailwind CSS"
    backend & data: "Node.js · Supabase · PostgreSQL · MongoDB Atlas · Snowflake · MySQL · REST APIs · migrations · authN/authZ"
    testing & devops: "Git · Docker · Kubernetes · CI/CD · GitHub Actions · Vitest · Playwright · mobile simulator testing · security smoke tests · secrets scanning"
    cloud/security/obs: "Render · Sentry integration · Cloudflare · CORS/security headers · native error logging · privacy-safe admin tooling"
    analytics: "Power BI · data scraping · data analysis · SQL querying"

uptime:
  label: "human uptime"

  # custom = use start_date below (or PROFILE_START_DATE secret)
  # github_account = use GitHub account creation date
  source: "custom"

  start_date: "2004-07-13"

  # Use any IANA timezone for DST-aware output.
  # Examples: America/New_York, Europe/London, Asia/Tokyo, Australia/Sydney
  timezone: "America/New_York"
  timezone_display: "Eastern Time"
  precision: "days"

display:
  top_languages: 4
  exclude_languages:
    - HTML
    - CSS

  # Stats collection lookback window
  contributions_window_days: 365

  # Order of metadata sections in README/SVG
  readme_section_order:
    - personal
    - top skills
    - github stats
    - contact

  readme_ascii_column_width: 44
  readme_info_column_width: 58
  readme_avatar_rows_ratio: 0.56
  readme_compact: true
  show_public_email: false

  # Avatar source controls
  avatar_path: ""
  avatar_cache_path: "assets/avatar.png"
  ascii_width: 46
  avatar_vertical_focus: 0.50
  avatar_zoom: 1.05
  ascii_shape: "square" # rounded_square, circle, or square

theme:
  accent: "#f97316"
  accent_2: "#14b8a6"

preview:
  # Used by --offline mode only.
  name: "your-name"
  public_repos: 1
  stars: 0

runtime_managed:
  # These are generated by the cron workflow; do not edit here.
  github_stats: "AUTO (repositories, commits, + / -, lines of code, scope)"
  next_refresh_at: "AUTO (from cron schedule + timezone)"
  timezone_suffix: "AUTO (EST/EDT and UTC offset)"
