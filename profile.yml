# personalized for @aerybyte.
# blank values disappear from the generated card.

profile:
  role: "software engineer · product builder"
  tagline: ""
  show_location: false
  show_website: false

sections:
  now:
    building: "ATP — Around The Post"
    product: "a social app for better pickleball games"
    learning: "scalable architecture · mobile-first design"
    exploring: "developer tools · automation loops · clean UX"
  stack:
    languages: "Python · TypeScript · JavaScript · C# · Java · C · SQL"
    frontend: "React · Next.js · React Native · TypeScript · HTML · CSS · Tailwind CSS"
    backend & data: "Node.js · Supabase · PostgreSQL · MongoDB Atlas · Snowflake · MySQL · REST APIs · migrations · authN/authZ"
    testing & devops: "Git · Docker · Kubernetes · CI/CD · GitHub Actions · Vitest · Playwright · mobile simulator testing · security smoke tests · secrets scanning"
    cloud/security/obs: "Render · Sentry integration · Cloudflare · CORS/security headers · native error logging · privacy-safe admin tooling"
    analytics: "Power BI · data scraping · data analysis · SQL querying"

uptime:
  label: "human uptime"
  source: "custom"
  start_date: "2004-07-13"
  # use an iana zone instead of a fixed utc-05:00 offset so edt is handled too.
  timezone: "America/New_York"
  timezone_display: "Eastern Time"
  precision: "days"

display:
  top_languages: 4
  exclude_languages:
    - HTML
    - CSS
  contributions_window_days: 365
  readme_section_order:
    - profile
    - now
    - stack
    - github --live
    - contact
    - automation
  readme_ascii_column_width: 44
  readme_info_column_width: 58
  readme_avatar_rows_ratio: 0.56
  readme_compact: true
  show_public_email: false

  # blank = fetch the current github profile picture on every scheduled run.
  avatar_path: ""
  # last successful download. it is also the offline/emergency fallback.
  avatar_cache_path: "assets/avatar.png"
  ascii_width: 46
  avatar_vertical_focus: 0.50
  avatar_zoom: 1.05
  ascii_shape: "rounded_square" # rounded_square, circle, or square

theme:
  accent: "#f97316"
  accent_2: "#14b8a6"

preview:
  # used only by `python scripts/build_profile.py --offline`.
  name: "aery"
  public_repos: 1
  stars: 0
